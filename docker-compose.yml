services:

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - downloads:/app/downloads
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Optional: subdl.com key for auto-subtitles
      # - SUBDL_API_KEY=your_key_here
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  downloads:
